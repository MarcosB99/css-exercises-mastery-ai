<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <script
      src="https://kit.fontawesome.com/579053ac65.js"
      crossorigin="anonymous"></script>
    <title>Responsive Photo Gallery</title>
  </head>
  <body>
    <header>
      <a href="#index.html" class="logo-text">Wander<span>Scape</span></a>
      <button
        class="hamburger"
        id="hamburger-btn"
        aria-label="Toggle navigation"
        aria-expanded="false">
        <i class="fa-solid fa-bars"></i>
      </button>
      <nav id="navbar">
        <ul class="nav-links">
          <li><a href="#hero-section">Home</a></li>
          <li><a href="#plans-section">Plans</a></li>
          <li><a href="#gallery-section">Examples</a></li>
          <li><a href="#contact-section">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="hero-section">
        <h1 class="hero-title">WanderScape</h1>
        <h2 class="hero-subtitle">
          Capturing the world's most breathtaking destinations.
        </h2>
        <p class="hero-description">
          Explore a curated collection of landscapes, cities, wildlife, and
          hidden gems from around the world. Every photograph tells a story of
          adventure, culture, and natural beauty.
        </p>
      </section>
      <section id="gallery-section">
        <div class="gallery-container">
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-1.jpg"
              alt="Sunrise casting golden light over the snow-capped Alps in Switzerland" />
            <figcaption>
              Sunrise Over the Alps <span class="location">Switzerland</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-2.jpg"
              alt="Golden sand dunes stretching across the Moroccan desert landscape" />
            <figcaption>
              Golden Desert Dunes <span class="location">Morocco</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-3.jpg"
              alt="A hidden waterfall cascading through a lush forest in Iceland" />
            <figcaption>
              Hidden Forest Waterfall <span class="location">Iceland</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-4.jpg"
              alt="Vibrant city lights illuminating the night skyline of Tokyo, Japan" />
            <figcaption>
              City Lights at Night <span class="location">Tokyo, Japan</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-5.jpg"
              alt="Crystal clear turquoise blue lake surrounded by evergreen trees in Canada" />
            <figcaption>
              Crystal Blue Lake <span class="location">Canada</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-6.jpeg"
              alt="Historic cobblestone streets lined with colorful architecture in Prague, Czech Republic" />
            <figcaption>
              Historic Stone Streets
              <span class="location">Prague, Czech Republic</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-7.jpg"
              alt="A cozy wooden mountain cabin nestled in Norway's snowy wilderness" />
            <figcaption>
              Mountain Cabin Retreat <span class="location">Norway</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-8.jpeg"
              alt="Dramatic ocean cliffs overlooking the deep blue Atlantic Ocean in Portugal" />
            <figcaption>
              Ocean Cliffs <span class="location">Portugal</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-9.jpg"
              alt="Pink cherry blossom trees in full bloom along a path in Kyoto, Japan" />
            <figcaption>
              Cherry Blossom Season <span class="location">Kyoto, Japan</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-10.jpg"
              alt="Golden sunset over the Kenyan savannah with acacia trees and wildlife" />
            <figcaption>
              Safari at Sunset <span class="location">Kenya</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-11.jpg"
              alt="Vibrant green and purple Northern Lights dancing across the starry night sky in Finland" />
            <figcaption>
              Northern Lights <span class="location">Finland</span>
            </figcaption>
          </figure>
          <figure class="gallery-item">
            <img
              class="gallery-picture"
              src="./assets/photo-12.jpeg"
              alt="Idyllic tropical beach with overwater bungalows and turquoise water in the Maldives" />
            <figcaption>
              Tropical Paradise Beach <span class="location">Maldives</span>
            </figcaption>
          </figure>
        </div>
      </section>
    </main>
    <script>
      const hamburger = document.getElementById("hamburger-btn");
      const navbar = document.getElementById("navbar");

      hamburger.addEventListener("click", () => {
        const isOpen = navbar.classList.toggle("active");
        hamburger.setAttribute("aria-expanded", isOpen);

        // Switch icon between ☰ and ✕
        const icon = hamburger.querySelector("i");
        if (isOpen) {
          icon.className = "fa-solid fa-xmark"; // Close icon
        } else {
          icon.className = "fa-solid fa-bars"; // Hamburger icon
        }
      });

      // Optional: Close the menu when a nav link is clicked (better UX)
      document.querySelectorAll(".nav-links li a").forEach((link) => {
        link.addEventListener("click", () => {
          navbar.classList.remove("active");
          hamburger.setAttribute("aria-expanded", "false");
          hamburger.querySelector("i").className = "fa-solid fa-bars";
        });
      });
    </script>
    <script>
      // Header shrink on scroll
      const header = document.querySelector("header");
      let lastScroll = 0;

      window.addEventListener("scroll", () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll > 50) {
          header.classList.add("scrolled");
        } else {
          header.classList.remove("scrolled");
        }
        lastScroll = currentScroll;
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.8.2/css/all.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Anton%7CBaskervville%7CRaleway&display=swap" />
    <title>Personal Business Card</title>
  </head>
  <body>
    <div class="container">
      <div class="personal-info">
        <div class="profile-pic">
          <img
            src="./WhatsApp Image 2026-05-19 at 13.32.16.jpeg"
            alt="profile picture"
            class="profile-picture" />
        </div>
        <div class="name-job">
          <p class="name">Marcos Barrientos</p>
          <p class="job-title">Senior Networking Implementation Specialist</p>
        </div>
      </div>
      <div class="bio">
        <p class="short-bio">
          Designing resilient, human‑centered interfaces for 8+ years. I turn
          complex systems into elegant, accessible experiences.
        </p>
      </div>
      <div class="contact-section">
        <div class="social-icons">
          <a
            href="https://www.linkedin.com/in/marcos-barrientos-498697238/"
            target="_blank"
            rel="noopener noreferrer"
            ><i class="fab fa-linkedin-in"></i
          ></a>
          <a
            href="https://github.com/MarcosB99"
            rel="noopener noreferrer"
            target="_blank"
            ><i class="fab fa-github"></i
          ></a>
          <a
            href="https://www.youtube.com/@marcosbarrientos5272"
            target="_blank"
            rel="noopener noreferrer"
            ><i class="fab fa-youtube"></i
          ></a>
        </div>
        <button id="contact-btn" type="button">Get in Touch!</button>
      </div>
    </div>
  </body>
</html>
